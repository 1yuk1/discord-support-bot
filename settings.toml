# ==============================================================================
# Discord Bot Settings — SinusSMP Support
# ВАЖНО: Замените placeholder'ы на реальные значения перед запуском
# ==============================================================================

[discord]
token = "YOUR_DISCORD_TOKEN"
ticket_category_id = 123456789012345678
bot_role_id = 123456789012345678

[ai]
provider = "groq"  # "groq" или "local" (LM Studio / Ollama / vLLM)

[ai.groq]
api_key = "YOUR_GROQ_API_KEY"
model = "groq/compound"

[ai.local]
api_url = "http://localhost:1234/v1"
api_key = "not-needed"
model = "local-model"

[proxy]
enabled = false
host = "127.0.0.1"
port = 10808
username = ""
password = ""

[paths]
# Относительные пути от директории проекта
model_cache = "model_cache"
database = "chroma_db"
logs = "logs"

[rate_limit]
global_limit = 30
global_window = 60
channel_cooldown = 5
duplicate_check_time = 5
max_history = 6

[transfer]
# Фразы, при которых бот передаёт тикет человеку
phrases = [
    "тех поддержка", "техподдержка", "переведи на человека", "позови человека",
    "живой человек", "оператор", "администратор", "админ", "модератор", "модер",
    "переведи на админа", "позови админа", "соедини с человеком", "хочу человека",
    "говорить с человеком", "поговорить с человеком", "пригласи человека",
    "старший специалист", "позови специалиста", "переведи на специалиста",
    "передам", "передаю", "передал", "передать человеку", "передаю тикет"
]
